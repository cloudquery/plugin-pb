name: Trigger plugin-pb-go code generation
on:
  push:
    branches:
      - main

jobs:
  trigger-gen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CQ_APP_ID }}
          private-key: ${{ secrets.CQ_APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Trigger plugin-pb-go code generation
        uses: actions/github-script@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'cloudquery',
              repo: 'plugin-pb-go',
              workflow_id: 'regen.yml',
              ref: 'main',
            })
      - name: Trigger plugin-pb-python code generation
        uses: actions/github-script@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'cloudquery',
              repo: 'plugin-pb-python',
              workflow_id: 'regen.yml',
              ref: 'main',
            })
      - name: Trigger plugin-pb-java code generation
        uses: actions/github-script@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'cloudquery',
              repo: 'plugin-pb-java',
              workflow_id: 'regen.yml',
              ref: 'main',
            })
      - name: Trigger plugin-pb-javascript code generation
        uses: actions/github-script@v6
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: 'cloudquery',
              repo: 'plugin-pb-javascript',
              workflow_id: 'regen.yml',
              ref: 'main',
            })
